<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Quiz político</title>

<link rel="stylesheet" href="style.css">

<meta name="viewport" content="width=device-width, initial-scale=1">

</head>


<body>


<div class="container">


<header>

<h1>
Responda votações reais da Câmara dos Deputados
e descubra quais parlamentares mais concordam com você
</h1>

</header>



<!-- MENU INICIAL -->

<section id="menu-quiz">

<h2>Escolha o quiz que deseja fazer</h2>

<div class="quiz-opcoes">

<button class="botao-quiz" onclick="iniciarQuiz(5)">
⚡ Quiz rápido<br>
<span>5 perguntas</span>
</button>

<button class="botao-quiz" onclick="iniciarQuiz(10)">
🧠 Quiz médio<br>
<span>10 perguntas</span>
</button>

<button class="botao-quiz" onclick="iniciarQuiz(15)">
🏛 Quiz completo<br>
<span>15 perguntas</span>
</button>

</div>

</section>



<!-- QUIZ -->

<section id="quiz" style="display:none;">


<div class="quiz-card">


<div class="topo-pergunta">

<div id="contador"></div>

<div class="barra">
<div id="progresso"></div>
</div>

</div>



<div class="tipo-resumo">

Mostrar resumo:

<button onclick="mudarResumo('objetivo')">Objetivo</button>
<button onclick="mudarResumo('critico')">Crítico</button>

</div>



<div class="resumo-box">

<div id="resumo"></div>

</div>



<div class="contexto-box">

<div id="contexto"></div>

</div>



<div class="opcoes">

<button class="voto-sim" onclick="responder('Sim')">
👍 A favor
</button>

<button class="voto-nao" onclick="responder('Não')">
👎 Contra
</button>

<button class="voto-abst" onclick="responder('Abstenção')">
🤷 Indiferente
</button>

</div>



<div class="placar">

<p>Resultado da votação na Câmara</p>

<div id="placar-sim"></div>
<div id="placar-nao"></div>

</div>


</div>


</section>



<!-- RESULTADO -->

<section id="resultado" style="display:none;">


<div class="resultado-card">

<h2>Resultado do quiz</h2>


<div class="ranking">

<h3>Deputados mais próximos de você</h3>

<ol id="ranking-deputados"></ol>

</div>


<div class="ranking">

<h3>Partidos mais próximos de você</h3>

<ol id="ranking-partidos"></ol>

</div>


<button class="botao-reiniciar" onclick="reiniciarQuiz()">
Refazer quiz
</button>


</div>


</section>


</div>


<script src="quiz.js"></script>


</body>
</html>
